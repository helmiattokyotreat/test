name: Auto-create next release branch

# When a major release branch (releases/vN.0) is merged into master:
#   1. tag the merged release (vN.0) on the merge commit,
#   2. publish a GitHub Release whose notes are aggregated from the
#      "## Release Notes" section of every PR shipping in the release — i.e.
#      every PR merged into master since the previous release tag, including
#      hotfixes merged straight to master, not just release-branch PRs,
#   3. rewrite the merged release PR's description into the repo PR template
#      (Overview / Features & Fixes / Additional changes / How to test /
#      Post deploy script / Release Notes), aggregated from the bundled PRs,
#   4. open the next major release line (releases/v{N+1}.0) + its draft PR.
# Minor patch branches (releases/vN.1, vN.2, ...) are ignored — the ".0"
# suffix is what marks a major release here.

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  next-release-branch:
    name: Create next major release branch
    # Only on a real merge, and only for major release heads (releases/vN.0).
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'releases/v') &&
      endsWith(github.event.pull_request.head.ref, '.0')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          # Full history + tags: the release-notes step walks merge commits
          # since the previous release tag.
          fetch-depth: 0

      - name: Compute versions
        id: ver
        env:
          MERGED_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # MERGED_REF looks like: releases/v869.0
          if [[ ! "$MERGED_REF" =~ ^releases/v([0-9]+)\.0$ ]]; then
            echo "::notice::'$MERGED_REF' is not a major release branch, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          current_major="${BASH_REMATCH[1]}"
          # 10# forces base-10 so a leading zero is not read as octal.
          next_major=$(( 10#${current_major} + 1 ))
          # Tag the release that just merged (v{current}.0), not the new line.
          echo "tag=v${current_major}.0" >> "$GITHUB_OUTPUT"
          echo "branch=releases/v${next_major}.0" >> "$GITHUB_OUTPUT"
          # Previous SHIPPED release = the most recent release tag reachable from
          # HEAD, of ANY kind — a major (v{N-1}.0) OR a patch/hotfix tag shipped
          # straight from master between majors (v{N-1}.1, v{N-1}.2, ...). Using
          # the previous *major* here would re-list everything already shipped in
          # those intervening patch releases. --merged HEAD keeps only ancestors
          # (actually-shipped) tags; -v:refname version-sorts so the newest wins.
          # Excludes this release's own tag in case of a rerun. Empty on the very
          # first release (the range logic then falls back).
          prev_tag=$(git tag --merged HEAD --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+$' \
            | grep -vFx "v${current_major}.0" \
            | head -1 || true)
          echo "prev_tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Tag the merged release
        if: steps.ver.outputs.skip != 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          # Untrusted inputs — passed via env, never inline in the script.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          set -euo pipefail
          # Idempotent: a rerun after a mid-run failure must not fail on a
          # tag that a previous run already pushed.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            printf '%s\n\n%s\n%s\n%s\n' \
              "Release $TAG" \
              "PR #${PR_NUMBER}: ${PR_TITLE}" \
              "Merged: ${MERGED_AT}" \
              "${PR_URL}" > "$RUNNER_TEMP/tag-msg.txt"
            git tag -a "$TAG" -F "$RUNNER_TEMP/tag-msg.txt"
            git push origin "refs/tags/${TAG}"
            echo "::notice::Tagged $TAG on master."
          fi

      - name: Publish GitHub Release with aggregated notes
        if: steps.ver.outputs.skip != 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PREV_TAG: ${{ steps.ver.outputs.prev_tag }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Idempotent: don't clobber a release a previous run already published.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists, skipping."
            exit 0
          fi

          # Everything shipping in this release = all commits added to master
          # since the previous release tag (PREV_TAG..HEAD). HEAD is the release
          # merge commit. This range deliberately includes PRs merged straight
          # to master between releases (e.g. hotfixes), not only the ones routed
          # through the release branch — otherwise a hotfix that ships on master
          # would be missing from the release notes. The release-line merge
          # commit itself is filtered out below.
          if git ls-remote --exit-code --tags origin "refs/tags/${PREV_TAG}" >/dev/null 2>&1; then
            range="${PREV_TAG}..HEAD"
          # First release (no previous tag): fall back to the release-branch side
          # of the merge commit (HEAD^2), or HEAD if it was a fast-forward merge.
          elif git rev-parse -q --verify HEAD^2 >/dev/null 2>&1; then
            range="HEAD^1..HEAD^2"
          else
            range="HEAD"
          fi

          # Template-driven: read the release-notes heading from the PR template
          # instead of hardcoding it, so renaming/reordering sections or changing
          # this heading's level or casing does not break the flow. We locate the
          # section semantically (a heading mentioning "release" + "note").
          template=".github/PULL_REQUEST_TEMPLATE.md"
          rn_heading=""
          if [ -f "$template" ]; then
            rn_heading=$(grep -iE '^#+[[:space:]]+.*release.*note' "$template" | head -1 || true)
          fi
          # Fallback keeps the flow working even if the template is missing/renamed.
          [ -z "$rn_heading" ] && rn_heading="## Release Notes"
          echo "::notice::Release-notes heading: ${rn_heading}"

          # PRs bundled in this release = merge commits in range, minus the
          # release-line merges themselves (head ref under releases/v*).
          mapfile -t prs < <(
            git log $range --merges --grep='Merge pull request #' --pretty='%s' \
              | grep -v 'from [^ ]*/releases/v' \
              | sed -nE 's/^Merge pull request #([0-9]+).*/\1/p' \
              | sort -un
          )

          bugs=""
          changes=""
          for n in "${prs[@]}"; do
            title=$(gh pr view "$n" --repo "$REPO" --json title --jq '.title')
            body=$(gh pr view "$n" --repo "$REPO" --json body --jq '.body')
            # Text under the release-notes heading, up to the next heading or the
            # template footer separator ("----"), whichever comes first.
            notes=$(printf '%s\n' "$body" \
              | awk -v h="$rn_heading" '
                  index($0, h) == 1 && !f { f = 1; next }
                  f && /^#+[[:space:]]/ { exit }
                  f && /^----/ { exit }
                  f { print }' \
              | sed '/^[[:space:]]*$/d')
            # Fall back to the PR title so a PR is never silently dropped.
            [ -z "$notes" ] && notes="$title"
            # Normalise to one clean bullet per line (strip any existing marker).
            bullet=$(printf '%s\n' "$notes" | sed -E 's/^[[:space:]]*[-*][[:space:]]+//; s/^/- /')
            case "$title" in
              [Ff]ix:*|[Hh]otfix:*) bugs="${bugs}${bullet}"$'\n' ;;
              *) changes="${changes}${bullet}"$'\n' ;;
            esac
          done

          date_str="${MERGED_AT%%T*}"
          {
            echo "## ${TAG} — ${date_str}"
            echo
            if [ -n "$bugs" ]; then echo "### Bug fixes"; printf '%s\n' "$bugs"; fi
            if [ -n "$changes" ]; then echo "### Changes"; printf '%s\n' "$changes"; fi
            if [ -z "${bugs}${changes}" ]; then echo "_No bundled PRs with release notes found._"; fi
          } > "$RUNNER_TEMP/relnotes.md"

          # --latest is explicit: this workflow automates release publication, so
          # the newly published release must reliably become the repo's Latest
          # release rather than relying on GitHub's implicit selection.
          gh release create "$TAG" --repo "$REPO" --verify-tag --latest \
            --title "$TAG" --notes-file "$RUNNER_TEMP/relnotes.md"
          echo "::notice::Published release $TAG."

      - name: Rewrite the merged release PR description
        if: steps.ver.outputs.skip != 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PREV_TAG: ${{ steps.ver.outputs.prev_tag }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # The PR description mirrors THIS release PR's own diff: only the PRs
          # merged into the release branch (HEAD^1..HEAD^2). This is narrower than
          # the tag notes on purpose — the tag covers everything shipping on
          # master (incl. hotfixes merged straight to master), but a direct-to-
          # master PR is not part of this PR's Files changed, so listing it in the
          # description would contradict the diff. gh pr edit is idempotent.
          if git rev-parse -q --verify HEAD^2 >/dev/null 2>&1; then
            range="HEAD^1..HEAD^2"
          # Fast-forward merge (no merge commit): fall back to since prev tag.
          elif git ls-remote --exit-code --tags origin "refs/tags/${PREV_TAG}" >/dev/null 2>&1; then
            range="${PREV_TAG}..HEAD"
          else
            range="HEAD"
          fi

          mapfile -t prs < <(
            git log $range --merges --grep='Merge pull request #' --pretty='%s' \
              | grep -v 'from [^ ]*/releases/v' \
              | sed -nE 's/^Merge pull request #([0-9]+).*/\1/p' \
              | sort -un
          )

          # Text under a heading matched loosely by keyword(s), stopping at the
          # next heading or the template footer separator. $1=body $2=lowercased
          # heading-keyword regex. Untrusted PR bodies only ever pass through
          # awk stdin / files — never interpolated into a command.
          section() {
            printf '%s\n' "$1" | awk -v re="$2" '
              tolower($0) ~ ("^#+[[:space:]]+" re) && !f { f = 1; next }
              f && /^#+[[:space:]]/ { exit }
              f && /^----/ { exit }
              f { print }' | sed -e '/^[[:space:]]*$/d'
          }

          feats=""; bugs=""; changes=""; addl=""; test_steps=""; postdeploy=""; links=""
          for n in "${prs[@]}"; do
            title=$(gh pr view "$n" --repo "$REPO" --json title --jq '.title')
            url=$(gh pr view "$n" --repo "$REPO" --json url --jq '.url')
            body=$(gh pr view "$n" --repo "$REPO" --json body --jq '.body')

            rn=$(section "$body" ".*release.*note")
            [ -z "$rn" ] && rn="$title"
            headline=$(printf '%s\n' "$rn" | sed -E 's/^[[:space:]]*[-*][[:space:]]+//' | head -1)

            # Features & Fixes: one PR-linked bullet each.
            feats="${feats}- **${title}** (#${n})${headline:+ — ${headline}}"$'\n'
            links="${links}#${n}, "

            # Release Notes: grouped fix/hotfix vs everything else.
            bullet=$(printf '%s\n' "$rn" | sed -E 's/^[[:space:]]*[-*][[:space:]]+//; s/^/- /')
            case "$title" in
              [Ff]ix:*|[Hh]otfix:*) bugs="${bugs}${bullet}"$'\n' ;;
              *) changes="${changes}${bullet}"$'\n' ;;
            esac

            a=$(section "$body" ".*additional.*change")
            [ -n "$a" ] && addl="${addl}${a}"$'\n'
            t=$(section "$body" ".*how.*to.*test")
            [ -n "$t" ] && test_steps="${test_steps}**${title} (#${n})**"$'\n'"${t}"$'\n\n'
            p=$(section "$body" ".*post.*deploy")
            [ -n "$p" ] && postdeploy="${postdeploy}**${title} (#${n})** — ${url}"$'\n'"${p}"$'\n\n'
          done
          links="${links%, }"

          date_str="${MERGED_AT%%T*}"
          {
            echo "## Overview"
            echo
            if [ -n "$links" ]; then
              echo "Release \`${TAG}\` (${date_str}). Bundles ${links}."
            else
              echo "Release \`${TAG}\` (${date_str})."
            fi
            echo
            echo "## Features & Fixes"
            echo
            if [ -n "$feats" ]; then printf '%s\n' "$feats"; else echo "_None._"; fi
            echo "## Additional changes"
            echo
            if [ -n "$addl" ]; then printf '%s\n' "$addl"; else echo "_None._"; fi
            echo
            echo "## How to test"
            echo
            if [ -n "$test_steps" ]; then printf '%s\n' "$test_steps"; else echo "_See the bundled PRs._"; fi
            echo "## Post deploy script"
            echo
            if [ -n "$postdeploy" ]; then printf '%s\n' "$postdeploy"; else echo "_None._"; fi
            echo
            echo "## Release Notes"
            echo
            if [ -n "$bugs" ]; then echo "### Bug fixes"; printf '%s\n' "$bugs"; fi
            if [ -n "$changes" ]; then echo "### Changes"; printf '%s\n' "$changes"; fi
            if [ -z "${bugs}${changes}" ]; then echo "_No bundled PRs with release notes found._"; fi
          } > "$RUNNER_TEMP/pr-body.md"

          gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file "$RUNNER_TEMP/pr-body.md"
          echo "::notice::Rewrote description of PR #${PR_NUMBER}."

      - name: Create next release branch and draft PR
        if: steps.ver.outputs.skip != 'true'
        env:
          NEXT_BRANCH: ${{ steps.ver.outputs.branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Create the branch only if it doesn't exist yet. A previous run may
          # have pushed the branch but failed before opening the PR, so branch
          # existence alone must NOT short-circuit the PR step below.
          if git ls-remote --exit-code --heads origin "$NEXT_BRANCH" >/dev/null 2>&1; then
            echo "::notice::$NEXT_BRANCH already exists, skipping branch creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git switch -c "$NEXT_BRANCH" master
            # Seed the release line with an empty commit so the draft PR has a
            # non-empty diff — GitHub rejects a PR with no commits between base
            # and head. Real release commits land on top of this.
            git commit --allow-empty -m "chore: open ${NEXT_BRANCH} release line"
            git push origin "$NEXT_BRANCH"
            echo "::notice::Created $NEXT_BRANCH from master."
          fi
          # Open the draft PR only if one isn't already open for this branch, so
          # a rerun after a mid-run failure can still create the missing PR.
          if [ -n "$(gh pr list --head "$NEXT_BRANCH" --base master --state open --json number --jq '.[0].number // ""')" ]; then
            echo "::notice::A PR for $NEXT_BRANCH is already open, nothing to do."
          else
            # Ensure the label exists so --label never hard-fails the run
            # (idempotent; no-op if it already exists).
            gh label create release --color C3CC48 2>/dev/null || true
            gh pr create \
              --draft \
              --base master \
              --head "$NEXT_BRANCH" \
              --title "Release ${NEXT_BRANCH}" \
              --label release \
              --body "Draft release PR for \`${NEXT_BRANCH}\`, opened automatically when the previous major release branch was merged. Release commits land here; mark it ready for review when the release is cut."
            echo "::notice::Opened draft PR for $NEXT_BRANCH."
          fi
